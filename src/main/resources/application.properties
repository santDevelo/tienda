spring.application.name=tienda
server.port=8080

logging.pattern.dateformat=hh:mm

spring.main.banner-mode=off

spring.thymeleaf.cache=false

#Clase 3
#Conexión local a la BD Techshop en MySQL
#spring.datasource.url=jdbc:mysql://localhost:3306/techshop
 
#Usuario y clave de creaTablas.sql
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
 
#Driver y plataforma de comunicación
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
 
#mostrar información en el log
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE


#Conexión local a la BD Techshop en MySQL
#spring.datasource.url=jdbc:mysql://localhost:3306/techshop

#Conexión nube aiven a la BD Techshop en MySQL
spring.datasource.url=jdbc:mysql://techshop-techshopcaleb.l.aivencloud.com:11475/techshop
